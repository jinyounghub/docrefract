name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build-test-pack:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore
        run: dotnet restore DocRefract.slnx --locked-mode

      - name: Build
        run: dotnet build DocRefract.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test DocRefract.slnx
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory artifacts/test-results

      - name: Pack tool
        run: >
          dotnet pack src/DocRefract.Cli/DocRefract.Cli.csproj
          --configuration Release
          --no-build
          --output artifacts/packages

      - name: Smoke installed tool contract
        shell: pwsh
        run: >
          ./tools/ci/smoke-tool.ps1
          -PackageDirectory artifacts/packages
          -WorkDirectory artifacts/tool-smoke

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results
          if-no-files-found: warn

      - name: Upload tool package
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.os }}
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
