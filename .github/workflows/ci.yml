name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build-test-pack:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify versioned metadata
        if: matrix.os == 'ubuntu-latest'
        shell: pwsh
        run: ./tools/ci/verify-version-sync.ps1

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore
        run: dotnet restore DocRefract.slnx --locked-mode

      - name: Build
        run: dotnet build DocRefract.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test DocRefract.slnx
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory artifacts/test-results

      - name: Pack tool
        run: >
          dotnet pack src/DocRefract.Cli/DocRefract.Cli.csproj
          --configuration Release
          --no-build
          --output artifacts/packages

      - name: Smoke installed tool contract
        shell: pwsh
        run: >
          ./tools/ci/smoke-tool.ps1
          -PackageDirectory artifacts/packages
          -WorkDirectory artifacts/tool-smoke

      - name: Download verified Syft for release contract
        if: matrix.os == 'ubuntu-latest'
        id: syft
        shell: pwsh
        run: |
          $syft = ./tools/ci/install-syft.ps1 `
            -Version "1.48.0" `
            -ExpectedSha256 "6cef9a7f37220d9067eaf9cfaaa2fce986e9f320a8d42cbc36658c99af78ea04" `
            -DestinationDirectory (Join-Path $env:RUNNER_TEMP "syft-1.48.0")
          "cmd=$syft" >> $env:GITHUB_OUTPUT

      - name: Validate packaged-payload SBOM contract
        if: matrix.os == 'ubuntu-latest'
        shell: pwsh
        run: |
          [xml]$build = Get-Content "Directory.Build.props"
          $version = [string]$build.Project.PropertyGroup.Version
          $package = Get-Item "artifacts/packages/DocRefract.Tool.$version.nupkg"
          ./tools/ci/build-sbom.ps1 `
            -SyftPath "${{ steps.syft.outputs.cmd }}" `
            -PackagePath $package.FullName `
            -OutputPath "artifacts/sbom/DocRefract.Tool.$version.spdx.json" `
            -WorkDirectory (Join-Path $env:RUNNER_TEMP "docrefract-sbom-payload") `
            -Version $version `
            -RepositoryUrl "https://github.com/$env:GITHUB_REPOSITORY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results-${{ matrix.os }}
          path: artifacts/test-results
          if-no-files-found: warn

      - name: Upload tool package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-${{ matrix.os }}
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
