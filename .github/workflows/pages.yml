name: Live demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build:
    name: Build demo report
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.302
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore
        run: dotnet restore DocRefract.slnx --locked-mode

      - name: Build live demo
        run: >
          dotnet run
          --project src/DocRefract.Cli/DocRefract.Cli.csproj
          --configuration Release
          --no-restore
          --
          demo
          --out artifacts/site

      - name: Verify deployable report
        shell: pwsh
        run: |
          foreach ($name in @("index.html", "diff.json")) {
            $path = Join-Path "artifacts/site" $name
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "Live demo did not produce $name."
            }
          }

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: artifacts/site

  deploy:
    name: Deploy live demo
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
